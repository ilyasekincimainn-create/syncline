name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: List available Xcode versions
      run: ls /Applications/ | grep Xcode

    - name: Set up Xcode version
      run: |
        if [ -d "/Applications/Xcode_16.0.app" ]; then
          sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer
        elif [ -d "/Applications/Xcode_15.4.app" ]; then
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
        else
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"
        fi
        xcodebuild -version

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: |
        cd syncline-ios
        xcodegen generate
        echo "=== Generated Project Structure ==="
        ls -la SyncLine.xcodeproj/
        echo "=== Available Schemes ==="
        xcodebuild -project SyncLine.xcodeproj -list

    - name: Resolve Package Dependencies
      run: |
        cd syncline-ios
        xcodebuild -resolvePackageDependencies \
          -project SyncLine.xcodeproj \
          -scheme SyncLine \
          -clonedSourcePackagesDirPath ../spm-packages
      timeout-minutes: 10

    - name: Build (Unsigned)
      run: |
        cd syncline-ios
        xcodebuild build \
          -project SyncLine.xcodeproj \
          -scheme SyncLine \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -derivedDataPath build/DerivedData \
          -clonedSourcePackagesDirPath ../spm-packages \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          AD_HOC_CODE_SIGNING_ALLOWED=YES \
          ONLY_ACTIVE_ARCH=NO
      timeout-minutes: 15

    - name: Create .app from build output
      run: |
        APP_PATH=$(find syncline-ios/build/DerivedData -name "SyncLine.app" -type d | head -1)
        echo "Found app at: $APP_PATH"
        if [ -z "$APP_PATH" ]; then
          echo "ERROR: SyncLine.app not found in build output"
          find syncline-ios/build/DerivedData -name "*.app" -type d
          exit 1
        fi
        mkdir -p syncline-ios/build/Payload
        cp -r "$APP_PATH" syncline-ios/build/Payload/

    - name: Package as Unsigned IPA
      run: |
        cd syncline-ios/build
        zip -r SyncLine.ipa Payload
        echo "=== IPA Created ==="
        ls -la SyncLine.ipa

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SyncLine-Unsigned-iOS
        path: syncline-ios/build/SyncLine.ipa
        if-no-files-found: error
