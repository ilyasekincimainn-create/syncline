name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Xcode version
      run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: |
        cd syncline-ios
        xcodegen generate

    - name: Resolve Package Dependencies
      run: |
        xcodebuild -resolvePackageDependencies \
          -project syncline-ios/SyncLine.xcodeproj \
          -scheme SyncLine

    - name: Build and Archive (Unsigned)
      run: |
        xcodebuild archive \
          -project syncline-ios/SyncLine.xcodeproj \
          -scheme SyncLine \
          -configuration Release \
          -archivePath syncline-ios/build/SyncLine.xcarchive \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          AD_HOC_CODE_SIGNING_ALLOWED=YES

    - name: Package as Unsigned IPA
      run: |
        mkdir -p syncline-ios/build/Payload
        cp -r syncline-ios/build/SyncLine.xcarchive/Products/Applications/SyncLine.app syncline-ios/build/Payload/
        cd syncline-ios/build
        zip -r SyncLine.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SyncLine-Unsigned-iOS
        path: syncline-ios/build/SyncLine.ipa
        if-no-files-found: error
