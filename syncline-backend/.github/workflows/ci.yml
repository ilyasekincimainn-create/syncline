name: SyncLine Backend CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-on-version: 20
        cache: 'npm'
        cache-dependency-path: 'syncline-backend/package-lock.json'

    - name: Install dependencies
      run: |
        cd syncline-backend
        npm ci

    - name: Run Build
      run: |
        cd syncline-backend
        npm run build

    - name: Run Lint
      run: |
        cd syncline-backend
        npm run lint

  docker-build-and-push:
    needs: lint-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Auth Service
      uses: docker/build-push-action@v5
      with:
        context: ./syncline-backend
        file: ./syncline-backend/infrastructure/docker/Dockerfile.auth
        push: true
        tags: |
          syncline/auth-service:latest
          syncline/auth-service:${{ github.sha }}

    - name: Build and Push Sync Service
      uses: docker/build-push-action@v5
      with:
        context: ./syncline-backend
        file: ./syncline-backend/infrastructure/docker/Dockerfile.sync
        push: true
        tags: |
          syncline/sync-service:latest
          syncline/sync-service:${{ github.sha }}

    - name: Build and Push Push Service
      uses: docker/build-push-action@v5
      with:
        context: ./syncline-backend
        file: ./syncline-backend/infrastructure/docker/Dockerfile.push
        push: true
        tags: |
          syncline/push-service:latest
          syncline/push-service:${{ github.sha }}

    - name: Build and Push Relay Service
      uses: docker/build-push-action@v5
      with:
        context: ./syncline-backend
        file: ./syncline-backend/infrastructure/docker/Dockerfile.relay
        push: true
        tags: |
          syncline/relay-service:latest
          syncline/relay-service:${{ github.sha }}
