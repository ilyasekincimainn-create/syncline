apiVersion: v1
kind: Namespace
metadata:
  name: syncline
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: syncline-config
  namespace: syncline
data:
  DATABASE_URL: "postgresql://postgres:postgres@postgres-service:5432/syncline?sslmode=disable"
  REDIS_URL: "redis://redis-service:6379"
  JWT_ALGORITHM: "HS256"
  TURN_URIS: "turn:localhost:3478?transport=udp,turn:localhost:3478?transport=tcp"
---
apiVersion: v1
kind: Secret
metadata:
  name: syncline-secret
  namespace: syncline
type: Opaque
data:
  # Base64 of 'syncline_super_secret_jwt_key_2026'
  JWT_SECRET: c3luY2xpbmVfc3VwZXJfc2VjcmV0X2p3dF9rZXlfMjAyNg==
  # Base64 of 'coturn_shared_secret'
  TURN_SECRET: Y290dXJuX3NoYXJlZF9zZWNyZXQ=
---
# Postgres StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: syncline
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: syncline
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: postgres
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: syncline
spec:
  ports:
  - port: 5432
  selector:
    app: postgres
---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: syncline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: syncline
spec:
  ports:
  - port: 6379
  selector:
    app: redis
---
# Auth Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: syncline
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: syncline/auth-service:latest
        ports:
        - containerPort: 3001
        envFrom:
        - configMapRef:
            name: syncline-config
        env:
        - name: PORT
          value: "3001"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: syncline-secret
              key: JWT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: syncline
spec:
  ports:
  - port: 3001
    targetPort: 3001
  selector:
    app: auth-service
---
# Sync Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sync-service
  namespace: syncline
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sync-service
  template:
    metadata:
      labels:
        app: sync-service
    spec:
      containers:
      - name: sync-service
        image: syncline/sync-service:latest
        ports:
        - containerPort: 3002
        envFrom:
        - configMapRef:
            name: syncline-config
        env:
        - name: PORT
          value: "3002"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: syncline-secret
              key: JWT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: sync-service
  namespace: syncline
spec:
  ports:
  - port: 3002
    targetPort: 3002
  selector:
    app: sync-service
---
# Push Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: push-service
  namespace: syncline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: push-service
  template:
    metadata:
      labels:
        app: push-service
    spec:
      containers:
      - name: push-service
        image: syncline/push-service:latest
        ports:
        - containerPort: 3003
        envFrom:
        - configMapRef:
            name: syncline-config
        env:
        - name: PORT
          value: "3003"
---
apiVersion: v1
kind: Service
metadata:
  name: push-service
  namespace: syncline
spec:
  ports:
  - port: 3003
    targetPort: 3003
  selector:
    app: push-service
---
# Relay Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: relay-service
  namespace: syncline
spec:
  replicas: 2
  selector:
    matchLabels:
      app: relay-service
  template:
    metadata:
      labels:
        app: relay-service
    spec:
      containers:
      - name: relay-service
        image: syncline/relay-service:latest
        ports:
        - containerPort: 3004
        envFrom:
        - configMapRef:
            name: syncline-config
        env:
        - name: PORT
          value: "3004"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: syncline-secret
              key: JWT_SECRET
        - name: TURN_SECRET
          valueFrom:
            secretKeyRef:
              name: syncline-secret
              key: TURN_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: relay-service
  namespace: syncline
spec:
  ports:
  - port: 3004
    targetPort: 3004
  selector:
    app: relay-service
---
# Ingress Routing
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: syncline-ingress
  namespace: syncline
  annotations:
    nginx.ingress.kubernetes.io/websocket-services: "sync-service,relay-service"
spec:
  rules:
  - http:
      paths:
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 3001
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: sync-service
            port:
              number: 3002
      - path: /signaling
        pathType: Prefix
        backend:
          service:
            name: relay-service
            port:
              number: 3004
