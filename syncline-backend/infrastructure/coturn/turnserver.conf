# TURN listener port
listening-port=3478

# TLS listener port
tls-listening-port=5349

# Use fingerprint in TURN messages
fingerprint

# Use long-term credential mechanism (REST API authentication compatibility)
lt-cred-mech

# Shared secret for HMAC-SHA1 dynamic token generation
use-auth-secret
static-auth-secret=coturn_shared_secret

# Realm for TURN credentials
realm=syncline.local

# Run as daemon (disabled here as Docker manages running process)
# daemon

# Log configurations
verbose
log-file=/var/log/turn.log

# Limit ports used for media relay
min-port=49152
max-port=65535

# Block loopback addresses for security
no-loopback-peers
no-multicast-peers
