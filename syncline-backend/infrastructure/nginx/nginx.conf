user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access_log.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Rate limiting zone for auth
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    upstream auth_backend {
        server auth-service:3001;
    }

    upstream sync_backend {
        server sync-service:3002;
    }

    upstream relay_backend {
        server relay-service:3004;
    }

    server {
        listen 8080;
        server_name localhost;

        # Redirect all HTTP requests to HTTPS in production
        # For local dev, we will serve HTTP directly
        
        # Auth REST Endpoints
        location /api/auth/ {
            # Apply rate limiting
            limit_req zone=auth_limit burst=5 nodelay;
            
            proxy_pass http://auth_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Sync WebSocket Endpoint
        location /ws {
            proxy_pass http://sync_backend/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # WebRTC Signaling WebSocket Endpoint
        location /signaling {
            proxy_pass http://relay_backend/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Global Health Check
        location /health {
            return 200 '{"status":"healthy","gateway":"nginx"}';
            add_header Content-Type application/json;
        }
    }
}
